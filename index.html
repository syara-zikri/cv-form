<!DOCTYPE html>
<html>

<head>

<title>
Formulir CV
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h2>Formulir Data CV</h2>

<p>
Isi data dengan lengkap
</p>



<form id="cvForm">



<label>Nama Lengkap</label>
<input name="nama" required>



<label>Tempat, Tanggal Lahir</label>
<input name="ttl">



<label>Jenis Kelamin</label>
<input name="gender">



<label>Alamat</label>
<textarea name="alamat"></textarea>



<label>No WhatsApp</label>
<input name="hp">



<label>Email</label>
<input name="email">



<label>Foto Profil (Link)</label>
<input name="foto">



<label>Tentang Saya</label>
<textarea name="profil"></textarea>



<label>Pendidikan Terakhir</label>
<textarea name="pendidikan"></textarea>



<label>Pengalaman Kerja</label>
<textarea name="pengalaman"></textarea>



<label>Organisasi</label>
<textarea name="organisasi"></textarea>



<label>Sertifikat</label>
<textarea name="sertifikat"></textarea>



<label>Keahlian</label>
<textarea name="skill"></textarea>



<label>Bahasa</label>
<textarea name="bahasa"></textarea>



<label>Hobi</label>
<textarea name="hobi"></textarea>



<button type="submit">

Kirim Data

</button>


</form>



<p id="status"></p>



</div>


<script src="script.js"></script>


</body>

</html>
